---
layout: page
---
<div id="post-list">
  {% for post in site.posts %}
  <article class="card-wrapper card">
    <a href="{{ post.url | relative_url }}" class="post-preview">
      <div class="card-body">
        <h1 class="card-title">{{ post.title }}</h1>
        <div class="card-text">
          <p>{{ post.description | default: post.content | strip_html | truncate: 150 }}</p>
        </div>
      </div>
    </a>
  </article>
  {% endfor %}
</div>
